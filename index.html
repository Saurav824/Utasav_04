
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utsav - The Festival Odyssey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0c0a09;
            color: #f5f5f4;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .bg-festive {
            background: linear-gradient(135deg, #450a0a 0%, #7c2d12 50%, #1e3a8a 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes float-alt {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            33% { transform: translateY(-15px) translateX(10px) rotate(5deg); }
            66% { transform: translateY(10px) translateX(-10px) rotate(-5deg); }
            100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
        }
        @keyframes drift {
            0% { transform: translateX(-20px) translateY(0px); }
            50% { transform: translateX(20px) translateY(-10px); }
            100% { transform: translateX(-20px) translateY(0px); }
        }
        @keyframes sway {
            0% { transform: rotate(-15deg) translateY(0px); }
            50% { transform: rotate(15deg) translateY(-15px); }
            100% { transform: rotate(-15deg) translateY(0px); }
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-float-alt {
            animation: float-alt 8s ease-in-out infinite;
        }
        .animate-drift {
            animation: drift 10s ease-in-out infinite;
        }
        .animate-sway {
            animation: sway 7s ease-in-out infinite;
        }
        .animate-pulse-soft {
            animation: pulse-soft 4s ease-in-out infinite;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 12s linear infinite;
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        .leaflet-container {
            z-index: 1 !important;
        }
        nav {
            z-index: 1000 !important;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
